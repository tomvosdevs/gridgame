[package]
name = "bigdrill"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18.0", features = ["bevy_gltf", "debug"] }
bevy_ecs_tilemap = "0.18.1"
bevy_ghx_grid = "0.8.0"
bevy_ghx_proc_gen = {version = "0.8.0", features = ["bevy_ghx_grid"]}
bevy_ui_anchor = "0.11.0"
rand = "0.10.0"

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

